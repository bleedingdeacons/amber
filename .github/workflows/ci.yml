name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: PHP 8.1
    runs-on: ubuntu-latest

    defaults:
      run:
        # Amber, Unity and Concordance are checked out side by side, mirroring
        # a WordPress plugins/ directory, so run everything from inside Amber.
        working-directory: amber

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: amber

      - name: Checkout Unity
        # Amber consumes Unity's interfaces; the test suite asserts against the
        # real contract rather than a copy (see tests/bootstrap.php), so Unity
        # must sit alongside as ../unity. Public repo, no token needed.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/unity
          ref: main
          path: unity

      - name: Checkout Concordance
        # MeetingReconciler reconciles Unity meetings against Concordance's
        # AAGBDB API client, so its ApiCache and GroupListing are needed too.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/concordance
          ref: main
          path: concordance

      - name: Checkout Scrutiny
        # Scanned by phpstan.neon.dist so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/scrutiny
          ref: main
          path: scrutiny

      - name: Checkout Tsml-for-unity
        # Scanned by phpstan.neon.dist so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/tsml-for-unity
          ref: main
          path: tsml-for-unity

      - name: Checkout Sentinel
        # Scanned by phpstan.neon.dist so cross-plugin symbols resolve.
        uses: actions/checkout@v4
        with:
          repository: bleedingdeacons/sentinel
          ref: main
          path: sentinel

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          # zip: build.php assembles the release archive with ZipArchive.
          extensions: mbstring, intl, json, zip
          tools: composer:v2
          # pcov drives PHPUnit's line coverage for the Coveralls upload below.
          # Much faster than xdebug for coverage-only runs.
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          # Keyed on composer.json: composer.lock is untracked in several of
          # these repos, so it is not a reliable cache key across the suite.
          # Scoped to this plugin's file — Unity and Concordance are checked
          # out alongside, and a '**' glob would fold theirs into the key too.
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.1-composer-${{ hashFiles('amber/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php8.1-composer-

      # --- Gates -----------------------------------------------------------
      # These fail the build. Each is verified to pass across the suite today.

      - name: Validate composer.json
        # --no-check-lock: composer.lock is untracked in some repos and drifted
        # from composer.json in others. Lock state is reported as advisory
        # below rather than blocking every PR in the suite.
        run: composer validate --no-check-lock

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP syntax
        # Shipped code only: tests/ is covered by the advisory test run, and
        # some suites currently contain files that cannot be parsed.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! out=$(php -l "$file" 2>&1); then
              echo "$out"
              status=1
            fi
          done < <(find . -path ./vendor -prune -o -path ./build -prune \
                        -o -path ./tests -prune -o -path ./node_modules -prune \
                        -o -name '*.php' -print0)
          exit $status

      - name: Build production archive
        # The build is what /bump ships, so a broken build must fail the PR.
        run: composer build:production

      - name: PHPUnit
        # A gate. These tests existed but had never run — there was no
        # phpunit.xml, no bootstrap and phpunit was not installed — so they
        # were silently rotting against a MeetingReconciler that had moved on.
        # They assert against Unity's and Concordance's real contracts via the
        # checkouts above, so a change to either fails here.
        #
        # The gate also emits a Clover report for the advisory Coveralls upload
        # below; extra args after `--` are forwarded to phpunit by the script.
        run: composer test -- --coverage-clover build/logs/clover.xml

      # --- Advisory --------------------------------------------------------
      # Reported but not yet enforced. Promote to a gate once a repo is green.

      - name: PHPStan
        # A gate. phpstan.neon.dist is committed so CI actually has a config
        # — it previously ran with none at all, analysing nothing. Existing
        # findings are grandfathered in phpstan-baseline.neon, so this fails
        # only on new ones.
        run: composer phpstan

      - name: Upload coverage to Coveralls (advisory)
        # Reports a coverage number; does not gate the build. The clover report
        # is produced by the PHPUnit step above. This action runs from the repo
        # root (defaults.run.working-directory does not apply to `uses:` steps),
        # so the file is under amber/ and base-path strips that prefix back off
        # the paths inside the report to match the repository layout.
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          file: amber/build/logs/clover.xml
          format: clover
          base-path: amber
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: composer.lock up to date (advisory)
        run: composer validate
        continue-on-error: true
